<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AryaX — What can I do for you?</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-theme="light">
  <div class="app" id="mainApp">
    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo-wrap" style="width: 24px; height: 24px; margin: 0;">
          <img src="logo.png" alt="AX" style="filter: grayscale(1);">
        </div>
        <span class="logo-text">manus</span>
      </div>

      <button class="new-task-btn" id="newChat">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New task
      </button>

      <div class="sidebar-nav">
        <div class="nav-item active" onclick="setMode('chat')" data-tooltip="Chat">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          <span>Agent</span>
          <span class="badge">New</span>
        </div>
        <div class="nav-item" data-tooltip="Search anything...">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <span>Search</span>
        </div>
        <div class="nav-item" data-tooltip="History">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
          <span>History</span>
        </div>

        <div class="sidebar-section">
          <div class="section-title">
            <span>Projects</span>
            <span style="cursor: pointer;">＋</span>
          </div>
          <div class="nav-item">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/></svg>
            New project
          </div>
        </div>

        <div class="sidebar-section" style="flex: 1;">
          <div class="section-title">All tasks</div>
          <div id="recentList"></div>
        </div>
      </div>

      <div class="sidebar-footer">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        <span style="flex: 1">Settings</span>
        <span>from AryaX</span>
      </div>
    </aside>

    <!-- MAIN -->
    <main class="main">
      <header class="top-nav">
        <div class="model-selector">
          Manus 1.6 Lite
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
        <div class="top-right">
          <svg data-tooltip="Notifications" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <div class="credits" data-tooltip="Your Credits Balance">
            ⚡ <span id="creditCount">265</span>
          </div>
          <div class="avatar" id="userAvatar" data-tooltip="User Profile">V</div>
        </div>
      </header>

      <div class="welcome" id="welcome">
        <div style="font-size: 14px; background: #f5f5f5; padding: 4px 12px; border-radius: 12px; margin-bottom: 20px; color: #666;">
          Free plan | <span style="color: #007bff; cursor: pointer;">Upgrade</span>
        </div>
        <h1>What can I do for you?</h1>

        <div class="input-container">
          <div class="input-box">
            <textarea id="input" placeholder="Assign a task or ask anything" rows="1"></textarea>
            <div class="input-footer">
              <div class="input-left-actions">
                <button class="plus-btn" id="fileBtn" data-tooltip="Upload Files">＋</button>
                <div class="tag-btn" data-tooltip="Fast Cloud Computation Mode">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                  Cloud computers <span style="font-size: 9px; opacity: 0.7;">New</span>
                </div>
              </div>
              <div class="input-right-actions">
                <span class="icon-btn" data-tooltip="Chat Mode">💬</span>
                <span class="icon-btn" data-tooltip="Voice Control">🎤</span>
                <button class="send-btn" id="send" data-tooltip="Send Message (Enter)">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
                </button>
              </div>
            </div>
          </div>

          <div class="quick-actions">
            <button class="quick-btn" onclick="setInput('Create slides for...')">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/></svg>
              Create slides
            </button>
            <button class="quick-btn" onclick="setInput('Build a website for...')">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
              Build website
            </button>
            <button class="quick-btn" onclick="setInput('Develop a desktop app for...')">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
              Develop desktop apps
            </button>
            <button class="quick-btn" onclick="setInput('Design a...')">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="M2 2l7.5 1.5"/><path d="M14 11l5 5"/></svg>
              Design
            </button>
            <button class="quick-btn">More</button>
          </div>
        </div>
      </div>

      <div class="chat" id="chat" style="display:none"></div>
    </main>

    <!-- ARTIFACT SIDEBAR -->
    <div class="artifact-sidebar" id="artifactSidebar">
      <div class="sidebar-header">
        <span class="logo-text">Artifact Preview</span>
        <button class="icon-btn" onclick="toggleArtifacts()">✕</button>
      </div>
      <div id="artifactBody" style="flex:1;overflow:hidden"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
