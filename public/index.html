<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AryaX — Neural Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=2.1">
</head>
<body class="manus-theme">
    <!-- NEURAL OVERLAY (AUTH) -->
    <div id="authOverlay" class="neural-overlay">
        <div class="glass-card">
            <div class="auth-content">
                <div class="brand">
                    <span class="brand-text">AryaX</span>
                </div>
                <h2>Welcome back</h2>
                <p>Log in to your account to continue</p>
                <form id="loginForm">
                    <div class="input-group">
                        <input type="text" id="loginUser" placeholder="Username" required>
                    </div>
                    <div class="input-group">
                        <input type="password" id="loginPass" placeholder="Password" required>
                    </div>
                    <button type="submit" class="elite-btn">Continue</button>
                    <div id="loginError" class="error-msg"></div>
                </form>
                <div class="auth-footer">
                    Don't have an account? <span onclick="alert('Signup is currently restricted. Please use demo credentials.')">Sign up</span>
                </div>
            </div>
        </div>
    </div>

    <!-- MAIN INTERFACE -->
    <div id="mainApp" class="app-container" style="display:none;">
        <aside class="side-panel">
            <div class="panel-header">
                <div class="mini-logo">AX</div>
                <button id="newChat" class="pill-btn">＋ New Session</button>
            </div>
            <nav id="recentList" class="session-list"></nav>
            <div class="panel-footer">
                <div class="user-pill">
                    <div class="avatar" id="userName">AX</div>
                    <button id="logoutBtn" class="logout-icon">⏻</button>
                </div>
            </div>
        </aside>

        <main class="chat-viewport">
            <header class="top-nav">
                <div class="nav-left">
                    <button id="toggleSidebar" class="icon-btn" aria-label="Toggle Sidebar">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                    </button>
                    <div class="mode-indicator">
                        <span class="pulse"></span>
                        <span id="modeLabel">AryaX Core</span>
                    </div>
                </div>
                <div class="stats">
                    <span id="creditCount" class="credit-badge">0 Credits</span>
                </div>
            </header>

            <div id="chat" class="message-stream">
                <div class="welcome-hero">
                    <h1>What's on the agenda today?</h1>
                </div>
            </div>

            <footer class="input-zone">
                <div class="floating-pill">
                    <textarea id="input" placeholder="Ask AryAX anything..." rows="1"></textarea>
                    <div class="input-actions">
                        <button id="send" class="send-pill">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
                        </button>
                    </div>
                </div>
                <div class="footer-legal">AryaX v2.6 — Artificial Human Intelligence</div>
            </footer>
        </main>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
    <script src="script.js?v=2.1"></script>
</body>
</html>
