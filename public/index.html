<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AryaX AI — World's Most Advanced AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-theme">
    <!-- AUTH OVERLAY -->
    <div id="authOverlay" class="overlay">
        <div class="auth-card">
            <h1>AryaX AI</h1>
            <p>Welcome to the 2065 Neural Interface</p>
            <form id="loginForm">
                <input type="text" id="loginUser" placeholder="Username" required>
                <input type="password" id="loginPass" placeholder="Password" required>
                <button type="submit" class="primary-btn">Initialize Connection</button>
                <div id="loginError" class="error"></div>
            </form>
            <div class="auth-footer">
                Don't have an account? <span onclick="alert('Signup is currently closed. Use demouser1/demo1234')">Request Access</span>
            </div>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="mainApp" style="display:none;">
        <div class="sidebar">
            <div class="sidebar-header">
                <span class="logo">AryaX</span>
                <button id="newChat" class="icon-btn">＋</button>
            </div>
            <div id="recentList" class="recent-list"></div>
            <div class="sidebar-footer">
                <span id="userName">User</span>
                <button id="logoutBtn" class="link-btn">Logout</button>
            </div>
        </div>

        <main class="content">
            <div class="topbar">
                <span id="modeLabel">General Intelligence</span>
                <div class="top-actions">
                    <span id="creditCount" class="badge">0 Credits</span>
                </div>
            </div>
            <div id="chat" class="chat-area">
                <div class="welcome-msg">
                    <h2>Hello, I am AryaX.</h2>
                    <p>How can I assist your mind today?</p>
                </div>
            </div>
            <div class="input-container">
                <div class="input-wrap">
                    <textarea id="input" placeholder="Transmit your thoughts..." rows="1"></textarea>
                    <button id="send" class="send-btn">▲</button>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
